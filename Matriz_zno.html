// IMPORTAR EXCEL
function importarExcel(event){

    const archivo = event.target.files[0];

    if(!archivo){
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const dataExcel = new Uint8Array(e.target.result);

        const workbook = XLSX.read(dataExcel, {type:'array'});

        const hoja = workbook.Sheets[workbook.SheetNames[0]];

        const datos = XLSX.utils.sheet_to_json(hoja, {header:1});

        datos.shift();

        data = datos;

        hot.loadData(data);

        alert('Archivo importado correctamente');

    }

    reader.readAsArrayBuffer(archivo);

}


// EXPORTAR EXCEL
function exportarExcel(){

    const datos = hot.getData();

    const encabezados = [[
        'N°',
        'Zona',
        'Ciudad',
        'Ubicación',
        'Piso',
        'Área',
        'Tipo',
        'Marca',
        'Modelo',
        'IP',
        'Serie',
        'Estado'
    ]];

    const worksheet = XLSX.utils.aoa_to_sheet([
        ...encabezados,
        ...datos
    ]);

    const workbook = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(workbook, worksheet, 'Inventario');

    XLSX.writeFile(workbook, 'Inventario_EP_PETROECUADOR.xlsx');

}


// ELIMINAR FILA Y ACTUALIZAR
function eliminarFilaSeleccionada(){

    const seleccion = hot.getSelectedLast();

    if(!seleccion){

        alert('Seleccione un registro');

        return;

    }

    const fila = seleccion[0];

    if(confirm('¿Desea eliminar este registro?')){

        // Eliminar del array principal
        data.splice(fila, 1);

        // Actualizar tabla
        hot.loadData(data);

        alert('Registro eliminado correctamente');

    }

}


// LIMPIAR TODO
function limpiarTodo(){

    if(confirm('¿Seguro que desea eliminar TODOS los registros?')){

        data = [];

        hot.loadData(data);

        alert('Todos los registros fueron eliminados');

    }

}


// BUSCADOR
const buscar = document.getElementById('buscar');

buscar.addEventListener('keyup', function(){

    const valor = this.value.toLowerCase();

    if(valor === ''){

        hot.loadData(data);

        return;

    }

    const filas = [];

    data.forEach(fila => {

        const contiene = fila.some(celda =>
            String(celda).toLowerCase().includes(valor)
        );

        if(contiene){

            filas.push(fila);

        }

    });

    hot.loadData(filas);

});


// FILTRO CIUDAD
const filtroCiudad = document.getElementById('filtroCiudad');

filtroCiudad.addEventListener('change', function(){

    const ciudad = this.value;

    if(ciudad === ''){

        hot.loadData(data);

        return;

    }

    const filtrado = data.filter(fila => fila[2] === ciudad);

    hot.loadData(filtrado);

});
